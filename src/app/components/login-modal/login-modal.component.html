<div class="login-modal" [class.open]="isOpen">
  <div class="login-modal__overlay" (click)="onOverlayClick()"></div>
  <div class="login-modal__box">
    <button class="login-modal__close" (click)="onClose()">
      <i class="fas fa-times"></i>
    </button>
    <div class="login-modal__header">
      <div class="login-modal__icon">
        <img src="assets/Logo_turbo_final.webp" alt="TurboMechanics" />
      </div>
      <h2>Bienvenido</h2>
      <p>Accede a tu cuenta TurboMechanics</p>
    </div>
    <form class="login-modal__form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">
          <i class="fas fa-envelope"></i> Correo electrónico
        </label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          placeholder="tucorreo@email.com"
          required
        />
      </div>
      <div class="form-group">
        <label for="password">
          <i class="fas fa-lock"></i> Contraseña
        </label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          required
        />
      </div>
      <button type="submit" class="login-modal__submit">Ingresar</button>
      <div class="login-modal__footer">
        <a href="#">¿Olvidaste tu contraseña?</a>
        <span>|</span>
        <a href="#">Crear cuenta</a>
      </div>
    </form>
  </div>
</div>
