<div class="auth-wrapper">
  <div class="auth-container">

    <div class="brand">
      <span class="brand-dot"></span>
      <h1>Webleb</h1>
    </div>

    <div class="card">
      <div class="card-inner">

        <h2>Sign Up</h2>
        <p class="subtitle">Create your account</p>

        <form [formGroup]="form">

          <div class="form-group">
            <i class="uil uil-user input-icon"></i>
            <input type="text" class="form-style" placeholder="Full Name" formControlName="name" required />
          </div>

          <div class="form-group">
            <i class="uil uil-id-card input-icon"></i>
            <input type="text" class="form-style" placeholder="Identification" formControlName="Identification"
              required />
          </div>

          <div class="form-group">
            <i class="uil uil-id-card input-icon"></i>
            <input type="text" class="form-style" placeholder="Cédula" formControlName="cedula" required />
          </div>

          <div class="form-group">
            <i class="uil uil-at input-icon"></i>
            <input type="email" class="form-style" placeholder="Email" formControlName="email" required />
          </div>

          <div class="form-group">
            <i class="uil uil-lock-alt input-icon"></i>
            <input type="password" class="form-style" placeholder="Password" formControlName="password" required />
          </div>

          <button class="btn-primary" type="button" (click)="register()">
            Register
          </button>

        </form>

        <p class="switch-text">
          Already have an account?
          <a (click)="irALogin()">Log In</a>
        </p>

      </div>
    </div>

  </div>
</div>
