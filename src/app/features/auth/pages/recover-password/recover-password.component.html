<div class="auth-wrapper">
  <div class="auth-container">

    <div class="card">
      <div class="card-inner">

        <div class="icon-header">
          <i class="uil uil-envelope-redo"></i>
        </div>

        <h2>Recover Password</h2>
        <p class="subtitle">Enter your email and we'll send you your password</p>

        <div class="form-group">
          <i class="uil uil-at input-icon"></i>
          <input
            type="email"
            class="form-style"
            placeholder="Email"
            [(ngModel)]="email"
            name="email"
            required
          />
        </div>

        <button class="btn-primary" (click)="recoverPassword()">
          Recover
        </button>

        <p class="switch-text">
          Remember your password?
          <a routerLink="/login">Log In</a>
        </p>

      </div>
    </div>

  </div>
</div>
