<div class="auth-wrapper">
  <div class="auth-container">

    <div class="brand">
      <span class="brand-dot"></span>
      <h1>TurboMechanics</h1>
    </div>

    <div class="card">
      <div class="card-inner">

        <!-- ── STEP 1: Email ── -->
        <ng-container *ngIf="step === 1">
          <div class="icon-header">
            <i class="uil uil-envelope-redo"></i>
          </div>
          <h2>Recover Password</h2>
          <p class="subtitle">Enter your email and we'll send you a reset code</p>

          <div class="form-group">
            <i class="uil uil-at input-icon"></i>
            <input
              type="email"
              class="form-style"
              placeholder="Email"
              [(ngModel)]="email"
              name="email"
            />
          </div>

          <button class="btn-primary" (click)="sendEmail()" [disabled]="isLoading">
            {{ isLoading ? 'Sending...' : 'Send Code' }}
          </button>
        </ng-container>

        <!-- ── STEP 2: Token ── -->
        <ng-container *ngIf="step === 2">
          <div class="icon-header">
            <i class="uil uil-key-skeleton"></i>
          </div>
          <h2>Enter Code</h2>
          <p class="subtitle">Check your email and enter the reset code</p>

          <div class="form-group">
            <i class="uil uil-lock-access input-icon"></i>
            <input
              type="text"
              class="form-style"
              placeholder="Reset code"
              [(ngModel)]="token"
              name="token"
            />
          </div>

          <button class="btn-primary" (click)="validateToken()" [disabled]="isLoading">
            {{ isLoading ? 'Validating...' : 'Validate Code' }}
          </button>
        </ng-container>

        <!-- ── STEP 3: New Password ── -->
        <ng-container *ngIf="step === 3">
          <div class="icon-header">
            <i class="uil uil-shield-check"></i>
          </div>
          <h2>New Password</h2>
          <p class="subtitle">Choose a strong new password for your account</p>

          <div class="form-group">
            <i class="uil uil-lock-alt input-icon"></i>
            <input
              type="password"
              class="form-style"
              placeholder="New password"
              [(ngModel)]="newPassword"
              name="newPassword"
            />
          </div>

          <button class="btn-primary" (click)="resetPassword()" [disabled]="isLoading">
            {{ isLoading ? 'Saving...' : 'Reset Password' }}
          </button>
        </ng-container>

        <!-- Step indicators -->
        <div class="steps">
          <span class="step-dot" [class.active]="step >= 1"></span>
          <span class="step-line"></span>
          <span class="step-dot" [class.active]="step >= 2"></span>
          <span class="step-line"></span>
          <span class="step-dot" [class.active]="step >= 3"></span>
        </div>

        <p class="switch-text">
          Remember your password?
          <a routerLink="/login">Log In</a>
        </p>

      </div>
    </div>

  </div>
</div>
