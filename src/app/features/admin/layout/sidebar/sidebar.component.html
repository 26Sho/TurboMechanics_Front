<aside class="sidebar" [class.collapsed]="sidebarService.collapsed()">

  <div class="sidebar__logo">
    <img src="assets/Logo-turbo-final-remove2.png" alt="Turbo Mechanics" class="logo-img" />
    <div class="logo-text" *ngIf="!sidebarService.collapsed()">
      <span class="logo-brand">TURBO</span>
      <span class="logo-sub">MECHANICS</span>
    </div>
  </div>

  <div class="sidebar__divider"></div>

  <nav class="sidebar__nav">
    <span class="nav-section-label" *ngIf="!sidebarService.collapsed()">GESTIÓN</span>
    <a *ngFor="let item of navItems"
       [routerLink]="item.route"
       routerLinkActive="active"
       class="nav-item"
       [title]="item.label">
      <span class="nav-icon" [innerHTML]="item.icon"></span>
      <span class="nav-label" *ngIf="!sidebarService.collapsed()">{{ item.label }}</span>
      <span class="nav-badge" *ngIf="item.badge && !sidebarService.collapsed()">{{ item.badge }}</span>
    </a>
  </nav>

    <div class="user-avatar-sm" *ngIf="sidebarService.collapsed()">JG</div>
</aside>
